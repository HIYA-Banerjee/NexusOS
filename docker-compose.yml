version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexusos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusos
      POSTGRES_PASSWORD: nexusos_dev_pass
      POSTGRES_DB: nexusos_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexusos -d nexusos_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nexusos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexusos_minio
      MINIO_ROOT_PASSWORD: nexusos_minio_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MailHog (local email testing) ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nexusos-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI

  # ── Elasticsearch (Phase 2 — comment out if not needed yet) ──────────────
  # elasticsearch:
  #   image: elasticsearch:8.13.0
  #   container_name: nexusos-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - ES_JAVA_OPTS=-Xms512m -Xmx512m
  #   ports:
  #     - '9200:9200'
  #   volumes:
  #     - es_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # es_data:

networks:
  default:
    name: nexusos-network
